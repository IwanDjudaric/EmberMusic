<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ember</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div id="app" class="app">

    <!-- ═══════════════ SIDEBAR ═══════════════ -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <svg class="brand-flame" viewBox="0 0 40 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="g-outer" x1="20" y1="0" x2="20" y2="48" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#FFE066"/>
              <stop offset="45%" stop-color="#FF8C00"/>
              <stop offset="100%" stop-color="#CC2200"/>
            </linearGradient>
            <linearGradient id="g-inner" x1="20" y1="10" x2="20" y2="42" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#FFFBEA"/>
              <stop offset="60%" stop-color="#FFD700"/>
              <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="M20 2C15 10 6 15 6 26a14 14 0 0 0 28 0C34 15 25 10 20 2z" fill="url(#g-outer)"/>
          <path d="M20 12c-2 5-6 8-6 14a6 6 0 0 0 12 0c0-6-4-9-6-14z" fill="url(#g-inner)"/>
        </svg>
        <span class="brand-name">Ember</span>
      </div>

      <nav class="sidebar-nav">
        <p class="nav-label">Library</p>

        <button class="nav-item active" data-view="library">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 5h-3v5.5c0 1.38-1.12 2.5-2.5 2.5S10 13.88 10 12.5 11.12 10 12.5 10c.57 0 1.08.19 1.5.5V5h4v2zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6z"/>
          </svg>
          All Tracks
        </button>

        <button class="nav-item" data-view="albums">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/>
          </svg>
          Albums
        </button>

        <button class="nav-item" data-view="artists">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
          Artists
        </button>

        <div class="nav-divider"></div>

        <div class="playlists-header">
          <p class="nav-label">Playlists</p>
          <button class="btn-icon" id="btn-new-playlist" title="New Playlist" aria-label="New Playlist">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          </button>
        </div>

        <div id="playlists-nav" class="playlists-nav">
          <!-- Playlists rendered here -->
        </div>
      </nav>

      <div class="sidebar-footer">
        <button class="btn-import" id="btn-import">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
          </svg>
          Import Music
        </button>
        <input type="file" id="file-input" accept=".mp3,.wav,.flac,.ogg,.m4a,.aac" multiple hidden />
      </div>
    </aside>

    <!-- ═══════════════ MAIN CONTENT ═══════════════ -->
    <main class="main" id="main">
      <div class="main-header">
        <div class="main-header-left">
          <h1 class="view-title" id="view-title">Your Library</h1>
          <span class="track-count" id="track-count"></span>
        </div>
        <div class="main-header-right">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input type="text" id="search-input" placeholder="Search your library…" autocomplete="off" />
          </div>
          <button class="btn-play-all" id="btn-play-all" title="Play All">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
            Play All
          </button>
        </div>
      </div>

      <!-- Drop overlay -->
      <div class="drop-overlay" id="drop-overlay" aria-hidden="true">
        <div class="drop-message">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
          </svg>
          <span>Drop audio files here</span>
        </div>
      </div>

      <!-- Content area -->
      <div class="content-area" id="content-area">

        <!-- Empty state -->
        <div class="empty-state" id="empty-state">
          <div class="empty-flame" aria-hidden="true">
            <svg viewBox="0 0 80 96" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="eg-outer" x1="40" y1="0" x2="40" y2="96" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#FFE066"/>
                  <stop offset="45%" stop-color="#FF8C00"/>
                  <stop offset="100%" stop-color="#CC2200"/>
                </linearGradient>
                <linearGradient id="eg-inner" x1="40" y1="20" x2="40" y2="84" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#FFFBEA"/>
                  <stop offset="60%" stop-color="#FFD700"/>
                  <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
                </linearGradient>
              </defs>
              <path d="M40 4C30 20 12 30 12 52a28 28 0 0 0 56 0C68 30 50 20 40 4z" fill="url(#eg-outer)"/>
              <path d="M40 24c-4 10-12 16-12 28a12 12 0 0 0 24 0c0-12-8-18-12-28z" fill="url(#eg-inner)"/>
            </svg>
          </div>
          <h2>Your library is empty</h2>
          <p>Import MP3, WAV, FLAC or OGG files to ignite your collection</p>
          <button class="btn-import-large" id="btn-import-empty">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
            Import Music
          </button>
        </div>

        <!-- Group/Album/Artist grid (for albums/artists views) -->
        <div class="group-grid" id="group-grid" style="display:none"></div>

        <!-- Track list -->
        <div class="track-list-wrap" id="track-list-wrap" style="display:none">
          <div class="track-list-header">
            <span class="col-num">#</span>
            <span class="col-art"></span>
            <span class="col-title">Title</span>
            <span class="col-album">Album</span>
            <span class="col-dur">
              <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14" aria-hidden="true">
                <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>
              </svg>
            </span>
          </div>
          <div id="track-list" class="track-list"></div>
        </div>

        <!-- Import progress -->
        <div class="import-progress" id="import-progress" style="display:none">
          <div class="import-progress-bar">
            <div class="import-progress-fill" id="import-progress-fill"></div>
          </div>
          <p id="import-progress-label">Importing…</p>
        </div>

      </div>
    </main>
  </div>

  <!-- ═══════════════ PLAYER BAR ═══════════════ -->
  <footer class="player-bar" id="player-bar">
    <!-- Track info -->
    <div class="player-info">
      <div class="player-artwork" id="player-artwork">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
      </div>
      <div class="player-meta">
        <div class="player-title" id="player-title">—</div>
        <div class="player-artist" id="player-artist">Select a track to play</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="player-controls">
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-shuffle" title="Shuffle" aria-label="Shuffle" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="btn-prev" title="Previous" aria-label="Previous">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play-btn" id="btn-play" title="Play / Pause" aria-label="Play">
          <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-next" title="Next" aria-label="Next">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-repeat" title="Repeat" aria-label="Repeat off" data-mode="off">
          <svg class="icon-repeat-all" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
          </svg>
          <svg class="icon-repeat-one" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="display:none">
            <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2v-5h-1l-2 1v1h1.5v3H13z"/>
          </svg>
        </button>
      </div>

      <div class="progress-row">
        <span class="time-label" id="time-current">0:00</span>
        <div class="progress-track" id="progress-track" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="progress-fill" id="progress-fill"></div>
          <div class="progress-thumb" id="progress-thumb"></div>
        </div>
        <span class="time-label" id="time-total">0:00</span>
      </div>
    </div>

    <!-- Volume -->
    <div class="player-volume">
      <button class="ctrl-btn vol-btn" id="btn-mute" title="Mute" aria-label="Mute">
        <svg class="icon-vol" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        <svg class="icon-mute" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="display:none">
          <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
        </svg>
      </button>
      <div class="volume-track" id="volume-track" role="slider" aria-label="Volume" aria-valuemin="0" aria-valuemax="100" aria-valuenow="80">
        <div class="volume-fill" id="volume-fill" style="width:80%"></div>
      </div>
    </div>
  </footer>

  <!-- ═══════════════ MODALS ═══════════════ -->
  <div class="modal-overlay" id="modal-new-playlist" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-np-title">
    <div class="modal">
      <h3 id="modal-np-title">New Playlist</h3>
      <input type="text" id="input-playlist-name" placeholder="Playlist name…" maxlength="60" autocomplete="off" />
      <div class="modal-actions">
        <button class="btn-secondary" id="btn-cancel-playlist">Cancel</button>
        <button class="btn-primary" id="btn-confirm-playlist">Create</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-add-to-playlist" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-ap-title">
    <div class="modal">
      <h3 id="modal-ap-title">Add to Playlist</h3>
      <div class="playlist-choices" id="playlist-choices"></div>
      <div class="modal-actions">
        <button class="btn-secondary" id="btn-cancel-add-playlist">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════ CONTEXT MENU ═══════════════ -->
  <div class="context-menu" id="context-menu" style="display:none" role="menu">
    <button class="ctx-item" id="ctx-play" role="menuitem">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
      Play Now
    </button>
    <button class="ctx-item" id="ctx-queue" role="menuitem">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z"/></svg>
      Add to Queue
    </button>
    <button class="ctx-item" id="ctx-playlist" role="menuitem">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 18h13v-2H3v2zm0-5h10v-2H3v2zm0-7v2h13V6H3zm18 9.59L17.42 12 21 8.41 19.59 7l-5 5 5 5L21 15.59z"/></svg>
      Add to Playlist
    </button>
    <div class="ctx-divider" role="separator"></div>
    <button class="ctx-item ctx-danger" id="ctx-delete" role="menuitem">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      Remove from Library
    </button>
  </div>

  <!-- ═══════════════ NOTIFICATION TOAST ═══════════════ -->
  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="node_modules/jsmediatags/dist/jsmediatags.min.js"></script>
  <script src="src/db.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
